<html>
    <head>
        <title>cars-viewer</title>
        <link rel="stylesheet" href="static/index.css">
    </head>
    <body>
        <h1>cars-viewer</h1>  
        <div class="grid">
        {{range .}}
        <div>
            <a href="/car/{{.ID}}">
                <img src="http://localhost:3000/api/images/{{.Image}}">
             </a>
             <p>{{.Name}}</p>
        </div>
       
        {{end}}
        </div>
    </body>
</html>
